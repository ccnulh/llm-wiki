# Render 部署配置
# 登录 Render.com -> New -> Blueprint -> 选择此文件

services:
  - type: web
    name: llm-wiki
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -b 0.0.0.0:$PORT -w 1
    rootDir: .
    envVars:
      - key: PYTHON_VERSION
        value: 3.11

      # 阿里云 DashScope (AI模型)
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: DASHSCOPE_MODEL
        value: qwen-plus
      - key: DASHSCOPE_BASE_URL
        value: https://dashscope.aliyuncs.com/api/v1

      # 阿里云 ASR (语音转文字)
      - key: ASR_APP_KEY
        sync: false
      - key: ASR_ACCESS_KEY_ID
        sync: false
      - key: ASR_ACCESS_KEY_SECRET
        sync: false

      # 飞书配置
      - key: FEISHU_APP_ID
        sync: false
      - key: FEISHU_APP_SECRET
        sync: false

      # 腾讯云 COS 配置
      - key: COS_SECRET_ID
        sync: false
      - key: COS_SECRET_KEY
        sync: false
      - key: COS_BUCKET_NAME
        value: llm-wiki-1314467141
      - key: COS_REGION
        value: ap-beijing

      # 编译配置
      - key: AUTO_COMPILE
        value: "true"
      - key: COMPILE_BATCH_SIZE
        value: "1"