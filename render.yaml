# Render 部署配置文件
# 将此文件复制到 server/render.yaml

# 登录 Render.com -> New -> Blueprint
# 连接 GitHub repo 并提交此文件

services:
  - type: web
    name: llm-wiki
    env: python
    region: oregon  # 或 frankfurt, singapore, sydney
    plan: free
    buildCommand: pip install -r server/requirements.txt
    startCommand: cd server && gunicorn app:app -b 0.0.0.0:$PORT -w 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11

      # 阿里云 DashScope
      - key: DASHSCOPE_API_KEY
        sync: false  # 不同步，部署后手动填写

      # 阿里云 ASR
      - key: ASR_APP_KEY
      - key: ASR_ACCESS_KEY_ID
      - key: ASR_ACCESS_KEY_SECRET
        sync: false

      # 飞书
      - key: FEISHU_APP_ID
      - key: FEISHU_APP_SECRET
        sync: false

      # 腾讯云 COS
      - key: COS_SECRET_ID
      - key: COS_SECRET_KEY
      - key: COS_BUCKET_NAME
        value: llm-wiki-1314467141
      - key: COS_REGION
        value: ap-beijing

      # 日志
      - key: LOG_LEVEL
        value: INFO

# 注意: Render 免费额度每月750小时，超时休眠
# 设置 Keepalive 可避免休眠: https://render.com/docs/free#keepalive